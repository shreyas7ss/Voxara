services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voxara
      POSTGRES_PASSWORD: voxara
      POSTGRES_DB: voxara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxara"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
